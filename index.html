<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karandeep Portfolio</title>
  <link rel="icon" type="image/png" href="/three.png" />
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 12px 18px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      letter-spacing: 1px;
    }

    #audio-btn {
      position: absolute;
      bottom: 28px;
      right: 28px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #audio-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    #audio-btn svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    /* spinning ring visible only when playing */
    #audio-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: white;
      border-right-color: rgba(255,255,255,0.3);
      opacity: 0;
      transition: opacity 0.3s;
      animation: spin 1.8s linear infinite;
    }

    #audio-btn.playing::before {
      opacity: 1;
    }

    /* bars pulse only when playing */
    #bars rect {
      transform-origin: bottom;
      animation: none;
    }

    #audio-btn.playing #bars rect:nth-child(1) { animation: bar 0.9s ease-in-out -0.4s infinite alternate; }
    #audio-btn.playing #bars rect:nth-child(2) { animation: bar 0.9s ease-in-out -0.2s infinite alternate; }
    #audio-btn.playing #bars rect:nth-child(3) { animation: bar 0.9s ease-in-out  0.0s infinite alternate; }
    #audio-btn.playing #bars rect:nth-child(4) { animation: bar 0.9s ease-in-out -0.3s infinite alternate; }

    @keyframes bar {
      from { transform: scaleY(0.25); }
      to   { transform: scaleY(1); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Project modal ── */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      z-index: 10;
    }

    #modal {
      position: relative;
      width: 90%;
      max-width: 880px;
      background: linear-gradient(145deg, rgba(22, 27, 38, 0.97), rgba(13, 17, 23, 0.99));
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 64px rgba(0,0,0,0.6),
        0 0 80px rgba(99, 102, 241, 0.08);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* top gradient accent bar */
    #modal-accent {
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    /* ambient glow behind card */
    #modal-glow {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 260px;
      height: 160px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.25) 0%, transparent 70%);
      pointer-events: none;
      filter: blur(20px);
    }

    #modal-hero {
      position: relative;
      width: 100%;
      height: 280px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      display: none;
    }

    #modal-hero.has-image {
      display: block;
    }

    #modal-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    #modal-hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, rgba(13, 17, 23, 0.99));
      pointer-events: none;
    }

    #modal-inner {
      padding: 36px 52px 52px;
    }

    #modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    #modal-close:hover {
      background: rgba(255,255,255,0.12);
      color: white;
      border-color: rgba(255,255,255,0.2);
    }

    #modal-close svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #modal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 16px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      color: #a5b4fc;
      text-transform: uppercase;
    }

    #modal-tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366f1;
      box-shadow: 0 0 6px #6366f1;
    }

    #modal-title {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      background: linear-gradient(135deg, #ffffff 60%, rgba(255,255,255,0.5));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #modal-divider {
      width: 40px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, #6366f1, #ec4899);
      margin-bottom: 18px;
    }

    #modal-desc {
      margin: 0 0 32px;
      font-size: 14px;
      line-height: 1.75;
      color: rgba(255, 255, 255, 0.55);
    }

    #modal-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    #modal-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #modal-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.5);
    }

    #modal-link:hover::before { opacity: 1; }

    #modal-link svg {
      width: 16px;
      height: 16px;
      stroke: white;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.2s;
    }

    #modal-link:hover svg { transform: translateX(3px); }

    /* ── GitHub card ── */
    #github-card {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      z-index: 20;
      width: 340px;
      background: linear-gradient(145deg, #161b22, #0d1117);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      text-align: center;
      pointer-events: none;
      opacity: 0;
    }

    #github-card.open {
      pointer-events: all;
    }

    #github-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.1);
      background: #21262d;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #github-avatar svg {
      width: 42px;
      height: 42px;
      fill: rgba(255,255,255,0.85);
    }

    #github-avatar::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.06);
    }

    #github-username {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #github-handle {
      margin: -8px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2px;
    }

    #github-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.06);
    }

    #github-visit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 10px;
      background: #238636;
      color: white;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(35,134,54,0.35);
    }

    #github-visit:hover {
      background: #2ea043;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(35,134,54,0.5);
    }

    #github-visit svg {
      width: 15px;
      height: 15px;
      fill: white;
    }

    #github-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    #github-close:hover { background: rgba(255,255,255,0.1); color: white; }

    #github-close svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #linkedin-card.open { pointer-events: all; }

    #linkedin-avatar {

      background: #0A66C2;
      display: flex;
      align-items: center;
      justify-content: center;

    }

    #linkedin-avatar svg {
      width: 40px;

    }

    #linkedin-avatar::after {
      content: '';

    }

    #linkedin-username {

    }

    #linkedin-handle {
      margin: -8px 0 0;

    }

    #linkedin-divider {
      width: 100%;

    }

    #linkedin-visit {
      display: inline-flex;

    }

    #linkedin-visit:hover {
      background: #0958a8;

    }

    #linkedin-visit svg {

    #linkedin-close {

      border-radius: 50%;

      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    #linkedin-close:hover { background: rgba(255,255,255,0.1); color: white; }

    #linkedin-close svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ── Gmail card ── */
    #gmail-card {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(120%);
      z-index: 20;
      width: 340px;
      background: linear-gradient(145deg, #1f1a1a, #0d1117);
      border: 1px solid rgba(234, 67, 53, 0.2);
      border-radius: 20px;
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7), 0 0 40px rgba(234,67,53,0.08), 0 0 0 1px rgba(255,255,255,0.04);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
      text-align: center;

    }

    #gmail-card.open { pointer-events: all; }

    #gmail-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 24px rgba(234,67,53,0.35);
    }

    #gmail-avatar svg {
      width: 38px;
      height: 38px;
    }

    #gmail-avatar::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(234,67,53,0.15);
    }

    #gmail-username {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #gmail-address {
      margin: -8px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.2px;
    }

    #gmail-divider {
      width: 100%;
      height: 1px;
      background: rgba(234,67,53,0.15);
    }

    #gmail-visit {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 10px;
      background: #EA4335;
      color: white;

      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;

    }

    #gmail-visit:hover {
      background: #d33426;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(234,67,53,0.55);
    }

    #gmail-visit svg {

      fill: white;
    }

    #gmail-close {
      position: absolute;
      top: 14px;
      right: 14px;

      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);

      cursor: pointer;
      display: flex;

    }

    #gmail-close:hover { background: rgba(255,255,255,0.1); color: white; }

    #gmail-close svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* ── Enter button (inside intro) ── */
    #enter-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      pointer-events: none;
    }

    #enter-btn {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, border-color 0.3s;
    }

    #enter-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
    }

    #enter-btn::before,
    #enter-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.18);
      animation: ripple 2.4s ease-out infinite;
    }
    #enter-btn::after { animation-delay: 1.2s; }

    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(2);   opacity: 0; }
    }

    #enter-btn svg {
      width: 28px;
      height: 28px;
      fill: white;
      opacity: 0.9;
      margin-left: 3px;
    }

    #enter-label {
      color: rgba(255,255,255,0.35);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0;
    }

    /* ── Intro / loading screen ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -120px; left: -100px;
      animation-duration: 12s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #8b5cf6, transparent 70%);
      bottom: -100px; right: -80px;
      animation-duration: 9s;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ec4899, transparent 70%);
      top: 40%; left: 55%;
      animation-duration: 14s;
      animation-delay: -7s;
      opacity: 0.2;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    #intro-content {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      text-align: center;
    }

    #intro-ring-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 32px;
    }

    /* outer slow ring */
    #intro-ring-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.25);
      animation: intro-spin-slow 8s linear infinite;
    }

    /* inner spinning arc */
    #intro-ring-wrap::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: #6366f1;
      border-right-color: #8b5cf6;
      animation: intro-spin 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      filter: drop-shadow(0 0 8px rgba(99,102,241,0.8));
    }

    #intro-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #intro-icon svg {
      width: 40px;
      height: 40px;
      opacity: 0.9;
      animation: intro-pulse 2s ease-in-out infinite;
    }

    @keyframes intro-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes intro-spin-slow {
      to { transform: rotate(-360deg); }
    }
    @keyframes intro-pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    #intro-title {
      margin: 0 0 8px;
